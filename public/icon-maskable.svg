<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Inferred 案卷图标（可遮罩）">
  <defs>
    <radialGradient id="vigm" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#23201a"/>
      <stop offset="55%" stop-color="#15130d"/>
      <stop offset="100%" stop-color="#0c0c0a"/>
    </radialGradient>
  </defs>

  <!-- 满幅背景，确保任意遮罩形状下都不露白 -->
